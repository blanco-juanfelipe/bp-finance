<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finanzas Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f4f1;
  --white:    #ffffff;
  --ink:      #111110;
  --ink2:     #6b6960;
  --ink3:     #b5b2a9;
  --border:   #e8e6e1;
  --border2:  #f0eeea;
  --accent:   #1a1a1a;
  --pill-bg:  #efefed;
  --green:    #1a7f4e;
  --green-bg: #edf7f2;
  --red:      #c94a2a;
  --red-bg:   #fdf0ec;
  --orange:   #c45800;
  --orange-bg:#fff0e6;
  --blue:     #1a5fa8;
  --r:        12px;
  --r-sm:     8px;
  --f: 'Geist', system-ui, sans-serif;
  --fm: 'Geist Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--ink); font-family: var(--f); min-height: 100dvh; -webkit-font-smoothing: antialiased; }

.app { max-width: 430px; margin: 0 auto; padding-bottom: 88px; }

/* ── HEADER ── */
.header {
  padding: env(safe-area-inset-top, 20px) 20px 0;
  padding-top: max(env(safe-area-inset-top, 20px), 20px);
  position: sticky; top: 0; z-index: 50; background: var(--bg);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.header-logo { font-size: 15px; font-weight: 600; letter-spacing: -.02em; color: var(--ink); display: flex; align-items: center; gap: 7px; }
.header-logo-mark { width: 26px; height: 26px; border-radius: 7px; background: var(--ink); display: flex; align-items: center; justify-content: center; }
.header-logo-mark svg { width: 14px; height: 14px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.month-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px 5px 10px;
  font-family: var(--f); font-size: 12px; font-weight: 500; color: var(--ink);
  cursor: pointer; transition: background .15s;
}
.month-btn:hover { background: var(--border2); }
.month-btn svg { width: 12px; height: 12px; color: var(--ink2); }

/* ── MONTH PICKER ── */
.month-picker { display: none; padding: 10px 20px 0; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.month-picker.open { display: flex; }
.month-picker::-webkit-scrollbar { display: none; }
.m-chip {
  flex-shrink: 0; background: var(--white); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 13px;
  font-size: 12px; font-weight: 500; color: var(--ink2);
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.m-chip:hover { border-color: var(--ink3); color: var(--ink); }
.m-chip.active { background: var(--ink); border-color: var(--ink); color: #fff; }

/* ── HERO CARD ── */
.hero {
  margin: 16px 20px 0; background: var(--white); border: 1px solid var(--border);
  border-radius: 18px; padding: 24px; position: relative; overflow: hidden;
}
.hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--ink2); margin-bottom: 6px; }
.hero-amount { font-size: 42px; font-weight: 300; letter-spacing: -.03em; color: var(--ink); line-height: 1; font-family: var(--f); }
.hero-amount sup { font-size: 18px; font-weight: 400; vertical-align: super; line-height: 0; color: var(--ink2); margin-right: 1px; }
.hero-sub { margin-top: 8px; font-size: 12px; color: var(--ink2); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.hero-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.hero-badge.green { background: var(--green-bg); color: var(--green); }
.hero-badge.red   { background: var(--red-bg);   color: var(--red); }

/* ── MTD COMPARISON (inside hero) ── */
.hero-divider { height: 1px; background: var(--border2); margin: 18px 0 14px; }
.mtd-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
.mtd-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.mtd-row:last-child { margin-bottom: 0; }
.mtd-period { font-size: 12px; color: var(--ink2); }
.mtd-right { display: flex; align-items: center; gap: 8px; }
.mtd-amt { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--ink); }
.mtd-delta { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 10px; }
.mtd-delta.up  { background: var(--red-bg);   color: var(--red); }
.mtd-delta.dn  { background: var(--green-bg); color: var(--green); }
.mtd-delta.neu { background: var(--pill-bg);  color: var(--ink2); }
.mtd-bar-wrap { margin-top: 10px; }
.mtd-bar-track { height: 3px; background: var(--border2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.mtd-bar-fill  { height: 100%; border-radius: 2px; background: var(--ink); transition: width .5s ease; }
.mtd-bar-fill.prev { background: var(--ink3); }

/* ── SECTION HEADER ── */
.section-hd { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 10px; }
.section-title { font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink2); }
.section-action { font-size: 12px; font-weight: 500; color: var(--ink2); cursor: pointer; }
.section-action:hover { color: var(--ink); }

/* ── CARD SHELL ── */
.card-shell { margin: 0 20px; background: var(--white); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.card-shell + .card-shell { margin-top: 8px; }

/* ── CATEGORY ROWS ── */
.cat-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border2); cursor: pointer; transition: background .1s; }
.cat-row:last-child { border-bottom: none; }
.cat-row:hover { background: var(--bg); }
.cat-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--pill-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.cat-body { flex: 1; min-width: 0; }
.cat-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.cat-bar-track { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
.cat-bar-fill { height: 100%; border-radius: 1px; background: var(--ink); transition: width .4s ease; }
.cat-right { text-align: right; flex-shrink: 0; }
.cat-amt { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--ink); }
.cat-pct { font-size: 11px; color: var(--ink3); margin-top: 2px; }

/* ── TX ROWS ── */
.tx-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border2); transition: background .1s; }
.tx-row:last-child { border-bottom: none; }
.tx-row:hover { background: var(--bg); }
.tx-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--pill-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.tx-body { flex: 1; min-width: 0; }
.tx-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; flex-wrap: nowrap; overflow: hidden; }
.tx-date { font-size: 11px; color: var(--ink3); white-space: nowrap; }
.tx-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink3); flex-shrink: 0; }
.tx-cat  { font-size: 11px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.owner-tag { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 20px; font-size: 10px; font-weight: 500; flex-shrink: 0; }
.owner-tag.jf   { background: #eef0fd; color: #3a4db5; }
.owner-tag.wife { background: #fde8f6; color: #b53a93; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amt { font-size: 13px; font-weight: 500; font-family: var(--fm); }
.tx-amt.out { color: var(--ink); }
.tx-amt.in  { color: var(--green); }
.tx-amt.int { color: var(--ink3); }
.tx-src { font-size: 10px; color: var(--ink3); margin-top: 2px; }

/* ── SHOW MORE ── */
.show-more-btn { display: block; width: 100%; padding: 13px 16px; font-family: var(--f); font-size: 13px; font-weight: 500; color: var(--ink2); text-align: center; background: transparent; border: none; cursor: pointer; border-top: 1px solid var(--border2); transition: color .1s; }
.show-more-btn:hover { color: var(--ink); }

/* ── FILTER TABS ── */
.filter-tabs { display: flex; gap: 6px; padding: 14px 20px 0; overflow-x: auto; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.f-tab { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); font-family: var(--f); font-size: 12px; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all .12s; }
.f-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.f-tab:hover:not(.active) { border-color: var(--ink3); color: var(--ink); }

/* ── RAPPI VIEW ── */
.rappi-stat-row { display: flex; border-bottom: 1px solid var(--border2); }
.rappi-stat { flex: 1; padding: 16px 12px; text-align: center; border-right: 1px solid var(--border2); }
.rappi-stat:last-child { border-right: none; }
.rappi-stat-val { font-size: 22px; font-weight: 300; letter-spacing: -.02em; font-family: var(--f); color: var(--ink); }
.rappi-stat-lbl { font-size: 10px; color: var(--ink3); margin-top: 3px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }

.rappi-pace { padding: 16px; border-bottom: 1px solid var(--border2); }
.rappi-pace-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--ink2); margin-bottom: 6px; }
.rappi-pace-val { font-size: 20px; font-weight: 300; letter-spacing: -.02em; color: var(--ink); margin-bottom: 4px; }
.rappi-pace-sub { font-size: 11px; color: var(--ink3); }

.rappi-history-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border2); }
.rappi-history-row:last-child { border-bottom: none; }
.rappi-history-mo { font-size: 13px; font-weight: 500; color: var(--ink); width: 64px; flex-shrink: 0; }
.rappi-history-bar-wrap { flex: 1; margin: 0 12px; }
.rappi-history-bar-track { height: 4px; background: var(--border2); border-radius: 2px; }
.rappi-history-bar-fill { height: 100%; border-radius: 2px; background: var(--orange); transition: width .5s ease; }
.rappi-history-right { text-align: right; flex-shrink: 0; }
.rappi-history-total { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--ink); }
.rappi-history-count { font-size: 11px; color: var(--ink3); margin-top: 2px; }

.rappi-store-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border2); }
.rappi-store-row:last-child { border-bottom: none; }
.rappi-store-rank { font-size: 11px; font-weight: 600; color: var(--ink3); width: 18px; flex-shrink: 0; text-align: center; }
.rappi-store-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rappi-store-right { text-align: right; flex-shrink: 0; }
.rappi-store-total { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--ink); }
.rappi-store-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }

.rappi-dow-row { display: flex; align-items: flex-end; gap: 4px; padding: 14px 16px; }
.rappi-dow-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.rappi-dow-bar-wrap { width: 100%; display: flex; align-items: flex-end; justify-content: center; height: 40px; }
.rappi-dow-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--orange); min-height: 3px; transition: height .4s ease; opacity: .7; }
.rappi-dow-bar.peak { opacity: 1; }
.rappi-dow-lbl { font-size: 9px; font-weight: 600; color: var(--ink3); letter-spacing: .04em; text-transform: uppercase; }
.rappi-dow-cnt { font-size: 10px; font-weight: 500; color: var(--ink2); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.92); backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0; padding-bottom: max(env(safe-area-inset-bottom, 10px), 10px);
  z-index: 100;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 16px; flex: 1; }
.nav-ico { font-size: 20px; line-height: 1; opacity: .3; transition: opacity .15s; }
.nav-lbl { font-size: 10px; font-weight: 500; color: var(--ink3); transition: color .15s; }
.nav-item.active .nav-ico { opacity: 1; }
.nav-item.active .nav-lbl { color: var(--ink); }

/* ── CONFIG ── */
.setup-wrap { padding: 24px 20px; }
.setup-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; padding: 24px; }
.setup-card h2 { font-size: 17px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
.setup-card p  { font-size: 13px; color: var(--ink2); line-height: 1.6; margin-bottom: 20px; }
.field + .field { margin-top: 14px; }
.field-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--ink2); margin-bottom: 6px; }
.field-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 11px 13px; font-family: var(--f); font-size: 13px; color: var(--ink); outline: none; transition: border-color .15s; }
.field-input:focus { border-color: var(--ink3); background: var(--white); }
.field-input::placeholder { color: var(--ink3); }
.field-hint { font-size: 11px; color: var(--ink3); margin-top: 5px; line-height: 1.4; }
.field-hint code { background: var(--border2); padding: 1px 5px; border-radius: 4px; font-family: var(--fm); }
.primary-btn { width: 100%; margin-top: 20px; background: var(--ink); border: none; border-radius: var(--r-sm); padding: 13px; font-family: var(--f); font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; transition: opacity .15s; }
.primary-btn:hover { opacity: .85; }

/* ── UTILS ── */
.loader { padding: 60px 20px; text-align: center; }
.spinner { width: 24px; height: 24px; margin: 0 auto 14px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-size: 13px; color: var(--ink2); }
.empty { padding: 48px 20px; text-align: center; }
.empty-icon { font-size: 28px; margin-bottom: 8px; }
.empty p { font-size: 13px; color: var(--ink2); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp .25s ease both; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<nav class="bottom-nav" id="nav">
  <div class="nav-item active" data-view="resumen" onclick="setView('resumen')">
    <div class="nav-ico">⊡</div><div class="nav-lbl">Resumen</div>
  </div>
  <div class="nav-item" data-view="movimientos" onclick="setView('movimientos')">
    <div class="nav-ico">↕</div><div class="nav-lbl">Movimientos</div>
  </div>
  <div class="nav-item" data-view="rappi" onclick="setView('rappi')">
    <div class="nav-ico">🛵</div><div class="nav-lbl">Rappi</div>
  </div>

</nav>

<script>
// ── FX RATES (fixed, update manually every few months) ──────────────
const FX = { COP: 1, USD: 3800, MXN: 210, EUR: 4600 };
function amtCOP(t) { return Math.abs(t.amount) * (FX[t.currency] || 1); }

// ── CREDENTIALS ──────────────────────────────
const SHEET_ID = '1qCjvEn76hqDEoalerFh-BU46dhnHjTi2vNQOFwAWXs8';
const API_KEY  = 'AIzaSyA2JNjOzjo_8EHiyyjEtiV0Vv89gcFdNes';

// ── STATE ────────────────────────────────────
const S = {
  view: 'resumen',
  sheetId: SHEET_ID,
  apiKey:  API_KEY,
  raw: null,
  selectedMonth: null,
  monthOpen: false,
  txFilter: 'todos',
  catFilter: null,   // category filter when jumping from Resumen
  sortBy: 'date',    // 'date' | 'amount'
  sortDir: 'desc',
  showAll: false,
};

const C = { DATE:0,TIME:1,OWNER:2,SOURCE:3,TYPE:4,DIR:5,AMOUNT:6,CUR:7,COUNTER:8,ACCOUNT:9,CAT:10,NOTES:11,ID:12 };

// ── DATA ─────────────────────────────────────
async function fetchSheet() {
  if (!S.sheetId || !S.apiKey) return null;
  const range = encodeURIComponent('Transactions!A2:M');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${range}?key=${S.apiKey}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).values || [];
  } catch(e) { console.error(e); return null; }
}

function parseRows(rows) {
  return (rows||[]).filter(r => r && r.length > 6).map(r => ({
    date:     r[C.DATE]   || '',
    time:     r[C.TIME]   || '',
    owner:    r[C.OWNER]  || '',
    source:   r[C.SOURCE] || '',
    type:     r[C.TYPE]   || '',
    dir:      r[C.DIR]    || '',
    amount:   parseFloat(String(r[C.AMOUNT]||'0').replace(/,/g,'').replace(/\s/g,'')) || 0,
    currency: r[C.CUR]    || 'COP',
    counter:  r[C.COUNTER]|| '',
    account:  r[C.ACCOUNT]|| '',
    cat:      r[C.CAT]    || 'Sin categoría',
  }));
}

function months(txs) {
  return [...new Set(txs.map(t => t.date.slice(0,7)))].sort().reverse();
}
function byMonth(txs, m) { return txs.filter(t => t.date.startsWith(m)); }

// ── FORMAT ───────────────────────────────────
function fmtCOP(n) {
  const a = Math.abs(n||0);
  if (a >= 1_000_000) return '$' + (a/1_000_000).toFixed(1).replace('.',',') + 'M';
  return '$' + Math.round(a).toLocaleString('es-CO');
}
function fmtMonth(ym) {
  const [y,m] = ym.split('-');
  return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1] + ' ' + y;
}
function fmtDate(d) {
  if (!d) return '';
  const [,m,day] = d.split('-');
  return +day + ' ' + ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m];
}

// Previous month string e.g. "2026-03" → "2026-02"
function prevMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  if (m === 1) return `${y-1}-12`;
  return `${y}-${String(m-1).padStart(2,'0')}`;
}

// ── CATEGORIES ───────────────────────────────
const EMOJI = {
  'Salud / EPS':'🏥','Cuota vehículo':'🚗','Deuda':'🏦','Tarjeta Nu':'💳',
  'Tarjeta Addi':'💳','Impuestos / Movilidad':'🏛️','Servicios públicos':'💡',
  'Empleada del hogar':'🏠','Transporte':'🚕','Domicilios / Rappi':'🛵',
  'Restaurantes / Comida':'🍽️','Mercado / Supermercado':'🛒','Lujo / Relojes':'⌚',
  'Ropa / Tecnología':'👕','Salud / Farmacia':'💊','Deporte / Gym':'🏃',
  'Bebé':'👶','Servicios':'📱','Suscripciones':'▶️','Internacional / Trabajo':'✈️',
  'Ahorro / Inversión':'💰','Ingreso':'💵','Ingreso internacional':'💵',
  'Movimiento interno':'↔️','Pago QR':'📲','Sin categoría':'·',
};
function emoji(cat) {
  for (const [k,v] of Object.entries(EMOJI)) if (cat && cat.includes(k)) return v;
  return '·';
}
function ownerTag(owner) {
  if (!owner) return '';
  const isJF = owner.toLowerCase().includes('juan');
  const cls  = isJF ? 'jf' : 'wife';
  const abbr = isJF ? 'JF' : owner.split(' ')[0].slice(0,2).toUpperCase();
  return `<span class="owner-tag ${cls}">${abbr}</span>`;
}

// ── RENDER ───────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!S.sheetId || !S.apiKey) { app.innerHTML = renderSetup(); bindConfig(); return; }
  if (S.raw === null) { app.innerHTML = renderLoading(); load(); return; }

  const txs = parseRows(S.raw);
  const mos = months(txs);
  if (!S.selectedMonth && mos.length) S.selectedMonth = mos[0];
  const mo = S.selectedMonth || '';

  if (S.view === 'resumen')     app.innerHTML = renderResumen(txs, mos, mo);
  if (S.view === 'movimientos') app.innerHTML = renderMovimientos(txs, mos, mo);
  if (S.view === 'rappi')       app.innerHTML = renderRappi(txs);

// ── MTD COMPARISON ───────────────────────────
function renderMTD(txs, mo) {
  const now      = new Date();
  const nowYM    = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const isCurMo  = mo === nowYM;

  // Cut-off day: today's date if current month, else last day of that month
  const cutDay   = isCurMo
    ? now.getDate()
    : new Date(+mo.split('-')[0], +mo.split('-')[1], 0).getDate(); // last day of mo

  const prev     = prevMonth(mo);
  const prevName = fmtMonth(prev).split(' ')[0]; // "Feb"
  const curName  = fmtMonth(mo).split(' ')[0];   // "Mar"

  // Filter: only expenses up through cutDay
  const curExp = byMonth(txs, mo)
    .filter(t => t.dir === 'out' && parseInt(t.date.slice(8,10)) <= cutDay)
    .reduce((s,t) => s + amtCOP(t), 0);

  const prevExp = byMonth(txs, prev)
    .filter(t => t.dir === 'out' && parseInt(t.date.slice(8,10)) <= cutDay)
    .reduce((s,t) => s + amtCOP(t), 0);

  // Delta
  const delta    = curExp - prevExp;
  const deltaPct = prevExp > 0 ? Math.round(Math.abs(delta) / prevExp * 100) : null;
  const deltaDir = delta > 0 ? 'up' : delta < 0 ? 'dn' : 'neu';
  const deltaLbl = deltaPct !== null
    ? `${delta > 0 ? '+' : '−'}${deltaPct}%`
    : '—';

  const maxAmt   = Math.max(curExp, prevExp) || 1;
  const periodLbl = isCurMo
    ? `días 1–${cutDay}`
    : `mes completo`;

  return `
  <div class="hero-divider"></div>
  <div class="mtd-label">vs mes anterior · ${periodLbl}</div>
  <div class="mtd-row">
    <div class="mtd-period">${curName} <span style="color:var(--ink3);font-size:11px">(este mes)</span></div>
    <div class="mtd-right">
      <div class="mtd-amt">${fmtCOP(curExp)}</div>
      ${prevExp > 0 ? `<div class="mtd-delta ${deltaDir}">${deltaLbl}</div>` : ''}
    </div>
  </div>
  <div class="mtd-bar-wrap">
    <div class="mtd-bar-track"><div class="mtd-bar-fill" style="width:${(curExp/maxAmt*100).toFixed(0)}%"></div></div>
  </div>
  <div class="mtd-row" style="margin-top:8px">
    <div class="mtd-period">${prevName} <span style="color:var(--ink3);font-size:11px">(mismo período)</span></div>
    <div class="mtd-right"><div class="mtd-amt" style="color:var(--ink3)">${fmtCOP(prevExp)}</div></div>
  </div>
  <div class="mtd-bar-wrap">
    <div class="mtd-bar-track"><div class="mtd-bar-fill prev" style="width:${(prevExp/maxAmt*100).toFixed(0)}%"></div></div>
  </div>`;
}

// ── RESUMEN ──────────────────────────────────
function renderResumen(txs, mos, mo) {
  const monthly  = byMonth(txs, mo);
  const expenses = monthly.filter(t => t.dir === 'out');
  const totalExp = expenses.reduce((s,t) => s + amtCOP(t), 0);
  const totalInc = monthly.filter(t => t.dir === 'in').reduce((s,t) => s + amtCOP(t), 0);
  const balance  = totalInc - totalExp;

  const catMap = {};
  expenses.forEach(t => { catMap[t.cat] = (catMap[t.cat]||0) + amtCOP(t); });
  const cats   = Object.entries(catMap).sort((a,b) => b[1]-a[1]).slice(0,7);
  const maxCat = cats[0]?.[1] || 1;

  const recent = [...expenses].sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time)).slice(0,5);

  return `
  ${renderHeader(mo, mos)}
  <div style="height:16px"></div>

  <div class="hero fade-up">
    <div class="hero-eyebrow">Gastos · ${fmtMonth(mo)}</div>
    <div class="hero-amount"><sup>$</sup>${Math.round(totalExp).toLocaleString('es-CO')}</div>
    <div class="hero-sub">
      <span class="hero-badge ${balance>=0?'green':'red'}">${balance>=0?'↑':'↓'} ${fmtCOP(Math.abs(balance))}</span>

    </div>
    ${mos.length > 1 ? renderMTD(txs, mo) : ''}
  </div>

  <div class="section-hd"><div class="section-title">Por categoría</div></div>
  <div class="card-shell fade-up">
    ${cats.length ? cats.map(([cat,amt]) => `
    <div class="cat-row" onclick="filterByCat('${cat}')">
      <div class="cat-icon">${emoji(cat)}</div>
      <div class="cat-body">
        <div class="cat-name">${cat}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(amt/maxCat*100).toFixed(0)}%"></div></div>
      </div>
      <div class="cat-right">
        <div class="cat-amt">${fmtCOP(amt)}</div>
        <div class="cat-pct">${(amt/totalExp*100).toFixed(0)}%</div>
      </div>
    </div>`).join('') : '<div class="empty"><div class="empty-icon">·</div><p>Sin gastos este mes</p></div>'}
  </div>

  <div class="section-hd">
    <div class="section-title">Recientes</div>
    <div class="section-action" onclick="setView('movimientos')">Ver todos →</div>
  </div>
  <div class="card-shell fade-up">${renderTxRows(recent, true)}</div>
  <div style="height:8px"></div>`;
}

// ── MOVIMIENTOS ──────────────────────────────
function renderMovimientos(txs, mos, mo) {
  const monthly = byMonth(txs, mo).filter(t => t.dir !== 'internal');
  let filtered  = monthly;
  if (S.txFilter === 'out') filtered = monthly.filter(t => t.dir === 'out');
  if (S.txFilter === 'in')  filtered = monthly.filter(t => t.dir === 'in');

  // Category filter (set by clicking a category in Resumen)
  if (S.catFilter) filtered = filtered.filter(t => t.cat === S.catFilter);

  // Sort
  if (S.sortBy === 'amount') {
    filtered = [...filtered].sort((a,b) =>
      S.sortDir === 'desc' ? amtCOP(b) - amtCOP(a) : amtCOP(a) - amtCOP(b));
  } else {
    filtered = [...filtered].sort((a,b) =>
      S.sortDir === 'desc'
        ? (b.date+b.time).localeCompare(a.date+a.time)
        : (a.date+a.time).localeCompare(b.date+b.time));
  }

  const shown = S.showAll ? filtered : filtered.slice(0, 25);

  // Sort button label cycles: date↓ → amount↓ → amount↑ → date↓
  const sortLabel = S.sortBy === 'date'
    ? (S.sortDir === 'desc' ? 'Fecha ↓' : 'Fecha ↑')
    : (S.sortDir === 'desc' ? 'Monto ↓' : 'Monto ↑');

  return `
  ${renderHeader(mo, mos)}
  <div class="filter-tabs">
    ${[['todos','Todos'],['out','Gastos'],['in','Ingresos']].map(([k,l]) =>
      `<button class="f-tab${S.txFilter===k?' active':''}" onclick="setFilter('${k}')">${l}</button>`
    ).join('')}
    ${S.catFilter ? `<button class="f-tab active" onclick="clearCatFilter()">× ${S.catFilter}</button>` : ''}
    <button class="f-tab${S.sortBy!=='date'?' active':''}" onclick="cycleSort()" style="margin-left:auto">${sortLabel}</button>
  </div>
  <div style="height:12px"></div>
  <div class="card-shell fade-up">
    ${renderTxRows(shown, true)}
    ${filtered.length > shown.length
      ? `<button class="show-more-btn" onclick="showMore()">Ver ${filtered.length-shown.length} más</button>`
      : ''}
  </div>
  <div style="height:8px"></div>`;
}

// ── RAPPI VIEW ───────────────────────────────
function renderRappi(txs) {
  const rappiAll = txs.filter(t => t.source === 'Rappi' && t.dir === 'out');
  if (!rappiAll.length) {
    return `
    ${renderHeader(null, [])}
    <div class="empty" style="margin-top:40px">
      <div class="empty-icon">🛵</div>
      <p>Sin pedidos de Rappi aún</p>
    </div>`;
  }

  const now    = new Date();
  const curYM  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const curMo  = rappiAll.filter(t => t.date.startsWith(curYM));

  // ── Current month stats
  const curTotal  = curMo.reduce((s,t) => s + amtCOP(t), 0);
  const curCount  = curMo.length;
  const curAvg    = curCount > 0 ? curTotal / curCount : 0;

  // ── Pace: project to end of month
  const dayOfMo   = now.getDate();
  const daysInMo  = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const pace      = dayOfMo > 0 ? (curTotal / dayOfMo) * daysInMo : 0;

  // ── Monthly history (last 4 complete months + current)
  const allMos    = months(rappiAll).slice(0, 5).reverse(); // oldest first
  const history   = allMos.map(ym => ({
    label: fmtMonth(ym),
    total: rappiAll.filter(t => t.date.startsWith(ym)).reduce((s,t) => s + amtCOP(t), 0),
    count: rappiAll.filter(t => t.date.startsWith(ym)).length,
    isCur: ym === curYM,
  }));
  const maxHist   = Math.max(...history.map(h => h.total), 1);

  // ── Top stores this month (or all-time if no current month data)
  const storeSource = curCount > 0 ? curMo : rappiAll;
  const storeMap  = {};
  storeSource.forEach(t => {
    const k = (t.counter || 'Rappi').replace('Rappi - ', '');
    storeMap[k] = storeMap[k] || { count: 0, total: 0 };
    storeMap[k].count++;
    storeMap[k].total += amtCOP(t);
  });
  const topStores = Object.entries(storeMap)
    .sort((a,b) => b[1].count - a[1].count)
    .slice(0, 5);

  // ── Day-of-week for current month (Sun=0…Sat=6, display Mon–Sun)
  const DOW_LABELS = ['L','M','X','J','V','S','D'];
  const dowCounts  = [0,0,0,0,0,0,0]; // Mon=0 … Sun=6
  curMo.forEach(t => {
    if (!t.date) return;
    const d = new Date(t.date + 'T12:00:00'); // noon avoids DST edge cases
    const js = d.getDay(); // Sun=0 … Sat=6
    const idx = js === 0 ? 6 : js - 1; // convert to Mon=0 … Sun=6
    dowCounts[idx]++;
  });
  const maxDow  = Math.max(...dowCounts, 1);

  return `
  ${renderHeader(null, [])}
  <div style="height:16px"></div>

  <!-- Current month stats -->
  <div class="section-hd">
    <div class="section-title">🛵 Rappi · ${fmtMonth(curYM)}</div>
  </div>
  <div class="card-shell fade-up">
    <div class="rappi-stat-row">
      <div class="rappi-stat">
        <div class="rappi-stat-val">${curCount}</div>
        <div class="rappi-stat-lbl">pedidos</div>
      </div>
      <div class="rappi-stat">
        <div class="rappi-stat-val">${fmtCOP(curTotal)}</div>
        <div class="rappi-stat-lbl">total</div>
      </div>
      <div class="rappi-stat">
        <div class="rappi-stat-val">${fmtCOP(curAvg)}</div>
        <div class="rappi-stat-lbl">promedio</div>
      </div>
    </div>

    <!-- Pace -->
    <div class="rappi-pace">
      <div class="rappi-pace-label">Al ritmo actual terminarás en</div>
      <div class="rappi-pace-val">${fmtCOP(pace)}</div>
      <div class="rappi-pace-sub">día ${dayOfMo} de ${daysInMo} · ${fmtCOP(curTotal / (dayOfMo||1))} por día</div>
    </div>

    <!-- Day of week -->
    ${curCount > 0 ? `
    <div style="padding:12px 16px 4px;border-bottom:1px solid var(--border2)">
      <div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Por día de la semana</div>
      <div class="rappi-dow-row" style="padding:0">
        ${DOW_LABELS.map((lbl, i) => `
        <div class="rappi-dow-col">
          <div class="rappi-dow-bar-wrap">
            <div class="rappi-dow-bar${dowCounts[i]===maxDow?' peak':''}" style="height:${Math.max(dowCounts[i]/maxDow*100,5).toFixed(0)}%"></div>
          </div>
          <div class="rappi-dow-lbl">${lbl}</div>
          <div class="rappi-dow-cnt">${dowCounts[i]||''}</div>
        </div>`).join('')}
      </div>
    </div>` : ''}
  </div>

  <!-- Top stores -->
  ${topStores.length ? `
  <div class="section-hd">
    <div class="section-title">Tiendas · ${curCount > 0 ? fmtMonth(curYM) : 'Histórico'}</div>
  </div>
  <div class="card-shell fade-up">
    ${topStores.map(([store, data], i) => `
    <div class="rappi-store-row">
      <div class="rappi-store-rank">${i+1}</div>
      <div class="rappi-store-name">${store}</div>
      <div class="rappi-store-right">
        <div class="rappi-store-total">${data.count}× · ${fmtCOP(data.total)}</div>
        <div class="rappi-store-meta">${fmtCOP(data.total/data.count)} promedio</div>
      </div>
    </div>`).join('')}
  </div>` : ''}

  <!-- Monthly history -->
  ${history.length > 1 ? `
  <div class="section-hd"><div class="section-title">Historial mensual</div></div>
  <div class="card-shell fade-up">
    ${history.map(h => `
    <div class="rappi-history-row" style="${h.isCur ? 'background:var(--bg)' : ''}">
      <div class="rappi-history-mo" style="${h.isCur ? 'font-weight:600' : ''}">${h.label.split(' ')[0]}</div>
      <div class="rappi-history-bar-wrap">
        <div class="rappi-history-bar-track">
          <div class="rappi-history-bar-fill" style="width:${(h.total/maxHist*100).toFixed(0)}%;${h.isCur?'opacity:.5':''}"></div>
        </div>
      </div>
      <div class="rappi-history-right">
        <div class="rappi-history-total">${fmtCOP(h.total)}</div>
        <div class="rappi-history-count">${h.count} pedidos</div>
      </div>
    </div>`).join('')}
  </div>` : ''}

  <div style="height:8px"></div>`;
}

// ── TX ROWS ──────────────────────────────────
function renderTxRows(txs, showDate) {
  if (!txs.length) return '<div class="empty"><div class="empty-icon">·</div><p>Sin movimientos</p></div>';
  return txs.map(t => {
    const cls    = t.dir==='in' ? 'in' : t.dir==='internal' ? 'int' : 'out';
    const prefix = t.dir==='in' ? '+' : '';
    return `
    <div class="tx-row">
      <div class="tx-icon">${emoji(t.cat)}</div>
      <div class="tx-body">
        <div class="tx-name">${t.counter||t.type}</div>
        <div class="tx-meta">
          ${showDate ? `<span class="tx-date">${fmtDate(t.date)}</span><span class="tx-dot"></span>` : ''}
          <span class="tx-cat">${t.cat}</span>
          <span class="tx-dot"></span>
          ${ownerTag(t.owner)}
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amt ${cls}">${prefix}${fmtCOP(amtCOP(t))}</div>
        <div class="tx-src">${t.currency !== 'COP' ? t.currency + ' ' + Math.abs(t.amount).toLocaleString('en-US', {maximumFractionDigits:2}) + ' · ' : ''}${t.source}</div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──────────────────────────────────
function setView(v) {
  S.view = v; S.showAll = false; S.monthOpen = false;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-view="${v}"]`)?.classList.add('active');
  render();
}
function cycleSort() {
  if (S.sortBy === 'date' && S.sortDir === 'desc')        { S.sortBy = 'amount'; S.sortDir = 'desc'; }
  else if (S.sortBy === 'amount' && S.sortDir === 'desc') { S.sortBy = 'amount'; S.sortDir = 'asc'; }
  else                                                     { S.sortBy = 'date';   S.sortDir = 'desc'; }
  S.showAll = false; render();
}
function clearCatFilter() { S.catFilter = null; S.showAll = false; render(); }
function filterByCat(cat) {
  S.catFilter = cat;
  S.txFilter  = 'out';
  S.sortBy    = 'date';
  S.sortDir   = 'desc';
  S.showAll   = false;
  setView('movimientos');
}
function setFilter(f) { S.txFilter = f; S.catFilter = null; S.showAll = false; render(); }
function showMore()   { S.showAll = true; render(); }

async function load() {
  const rows = await fetchSheet();
  S.raw = rows || [];
  const txs = parseRows(S.raw);
  const mos = months(txs);
  if (mos.length) S.selectedMonth = mos[0];
  render();
}
