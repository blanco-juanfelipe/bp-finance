<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finanzas Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f4f1;
  --white:    #ffffff;
  --ink:      #111110;
  --ink2:     #6b6960;
  --ink3:     #b5b2a9;
  --border:   #e8e6e1;
  --border2:  #f0eeea;
  --accent:   #1a1a1a;
  --pill-bg:  #efefed;
  --green:    #1a7f4e;
  --green-bg: #edf7f2;
  --red:      #c94a2a;
  --red-bg:   #fdf0ec;
  --blue:     #1a5fa8;
  --r:        12px;
  --r-sm:     8px;
  --f: 'Geist', system-ui, sans-serif;
  --fm: 'Geist Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 15px; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app { max-width: 430px; margin: 0 auto; padding-bottom: 88px; }

/* ── HEADER ── */
.header {
  padding: env(safe-area-inset-top, 20px) 20px 0;
  padding-top: max(env(safe-area-inset-top, 20px), 20px);
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.header-logo {
  font-size: 15px; font-weight: 600; letter-spacing: -.02em; color: var(--ink);
  display: flex; align-items: center; gap: 7px;
}
.header-logo-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--ink); display: flex; align-items: center; justify-content: center;
}
.header-logo-mark svg { width: 14px; height: 14px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.month-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px 5px 10px;
  font-family: var(--f); font-size: 12px; font-weight: 500; color: var(--ink);
  cursor: pointer; transition: background .15s;
}
.month-btn:hover { background: var(--border2); }
.month-btn svg { width: 12px; height: 12px; color: var(--ink2); }
.icon-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--white); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s;
}
.icon-btn:hover { background: var(--border2); }

/* ── MONTH PICKER ── */
.month-picker {
  display: none; padding: 10px 20px 0;
  gap: 6px; overflow-x: auto; scrollbar-width: none;
}
.month-picker.open { display: flex; }
.month-picker::-webkit-scrollbar { display: none; }
.m-chip {
  flex-shrink: 0; background: var(--white); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 13px;
  font-size: 12px; font-weight: 500; color: var(--ink2);
  cursor: pointer; transition: all .12s; white-space: nowrap;
}
.m-chip:hover { border-color: var(--ink3); color: var(--ink); }
.m-chip.active { background: var(--ink); border-color: var(--ink); color: #fff; }

/* ── HERO CARD ── */
.hero {
  margin: 16px 20px 0;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  position: relative; overflow: hidden;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink2); margin-bottom: 6px;
}
.hero-amount {
  font-size: 42px; font-weight: 300; letter-spacing: -.03em;
  color: var(--ink); line-height: 1;
  font-family: var(--f);
}
.hero-amount sup {
  font-size: 18px; font-weight: 400; vertical-align: super; line-height: 0;
  color: var(--ink2); margin-right: 1px;
}
.hero-sub {
  margin-top: 8px; font-size: 12px; color: var(--ink2);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.hero-sub-item { display: flex; align-items: center; gap: 4px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
}
.hero-badge.green { background: var(--green-bg); color: var(--green); }
.hero-badge.red   { background: var(--red-bg);   color: var(--red);   }

.hero-bars { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.hero-bar-row { display: flex; align-items: center; gap: 10px; }
.hero-bar-label { font-size: 11px; font-weight: 500; color: var(--ink2); width: 56px; flex-shrink: 0; }
.hero-bar-track {
  flex: 1; height: 5px; background: var(--border2);
  border-radius: 3px; overflow: hidden;
}
.hero-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.hero-bar-fill.exp { background: var(--ink); }
.hero-bar-fill.inc { background: var(--green); }
.hero-bar-val { font-size: 12px; font-weight: 500; font-family: var(--fm); color: var(--ink); min-width: 70px; text-align: right; }

/* ── SECTION HEADER ── */
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 20px 10px;
}
.section-title { font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink2); }
.section-action { font-size: 12px; font-weight: 500; color: var(--ink2); cursor: pointer; }
.section-action:hover { color: var(--ink); }

/* ── CARDS SHELL ── */
.card-shell {
  margin: 0 20px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}
.card-shell + .card-shell { margin-top: 8px; }

/* ── CATEGORY ROWS ── */
.cat-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border2);
  cursor: pointer; transition: background .1s;
}
.cat-row:last-child { border-bottom: none; }
.cat-row:hover { background: var(--bg); }
.cat-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--pill-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.cat-body { flex: 1; min-width: 0; }
.cat-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.cat-bar-track { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
.cat-bar-fill { height: 100%; border-radius: 1px; background: var(--ink); transition: width .4s ease; }
.cat-right { text-align: right; flex-shrink: 0; }
.cat-amt { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--ink); }
.cat-pct { font-size: 11px; color: var(--ink3); margin-top: 2px; }

/* ── TRANSACTION ROWS ── */
.tx-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border2);
  transition: background .1s;
}
.tx-row:last-child { border-bottom: none; }
.tx-row:hover { background: var(--bg); }
.tx-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--pill-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.tx-body { flex: 1; min-width: 0; }
.tx-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; flex-wrap: nowrap; overflow: hidden; }
.tx-date { font-size: 11px; color: var(--ink3); white-space: nowrap; }
.tx-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink3); flex-shrink: 0; }
.tx-cat  { font-size: 11px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.owner-tag {
  display: inline-flex; align-items: center;
  padding: 1px 6px; border-radius: 20px;
  font-size: 10px; font-weight: 500; flex-shrink: 0;
}
.owner-tag.jf   { background: #eef0fd; color: #3a4db5; }
.owner-tag.wife { background: #fde8f6; color: #b53a93; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amt { font-size: 13px; font-weight: 500; font-family: var(--fm); }
.tx-amt.out { color: var(--ink); }
.tx-amt.in  { color: var(--green); }
.tx-amt.int { color: var(--ink3); }
.tx-src { font-size: 10px; color: var(--ink3); margin-top: 2px; }

/* ── SHOW MORE ── */
.show-more-btn {
  display: block; width: 100%;
  padding: 13px 16px;
  font-family: var(--f); font-size: 13px; font-weight: 500;
  color: var(--ink2); text-align: center;
  background: transparent; border: none; cursor: pointer;
  border-top: 1px solid var(--border2);
  transition: color .1s;
}
.show-more-btn:hover { color: var(--ink); }

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex; gap: 6px; padding: 14px 20px 0;
  overflow-x: auto; scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.f-tab {
  flex-shrink: 0;
  padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--white);
  font-family: var(--f); font-size: 12px; font-weight: 500;
  color: var(--ink2); cursor: pointer; transition: all .12s;
}
.f-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.f-tab:hover:not(.active) { border-color: var(--ink3); color: var(--ink); }

/* ── INCOME ROW ── */
.income-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border2);
}
.income-row:last-child { border-bottom: none; }
.income-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.income-body { flex: 1; min-width: 0; }
.income-name { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.income-sub  { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.income-amt  { font-size: 13px; font-weight: 500; font-family: var(--fm); color: var(--green); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0;
  padding-bottom: max(env(safe-area-inset-bottom, 10px), 10px);
  z-index: 100;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 20px; flex: 1; }
.nav-ico { font-size: 20px; line-height: 1; opacity: .3; transition: opacity .15s; }
.nav-lbl { font-size: 10px; font-weight: 500; color: var(--ink3); transition: color .15s; }
.nav-item.active .nav-ico { opacity: 1; }
.nav-item.active .nav-lbl { color: var(--ink); }

/* ── CONFIG / SETUP ── */
.setup-wrap { padding: 24px 20px; }
.setup-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 18px; padding: 24px;
}
.setup-card h2 { font-size: 17px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
.setup-card p  { font-size: 13px; color: var(--ink2); line-height: 1.6; margin-bottom: 20px; }
.field + .field { margin-top: 14px; }
.field-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--ink2); margin-bottom: 6px; }
.field-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 11px 13px;
  font-family: var(--f); font-size: 13px; color: var(--ink);
  outline: none; transition: border-color .15s;
}
.field-input:focus { border-color: var(--ink3); background: var(--white); }
.field-input::placeholder { color: var(--ink3); }
.field-hint { font-size: 11px; color: var(--ink3); margin-top: 5px; line-height: 1.4; }
.field-hint code { background: var(--border2); padding: 1px 5px; border-radius: 4px; font-family: var(--fm); }
.primary-btn {
  width: 100%; margin-top: 20px;
  background: var(--ink); border: none; border-radius: var(--r-sm);
  padding: 13px; font-family: var(--f); font-size: 14px; font-weight: 500;
  color: #fff; cursor: pointer; transition: opacity .15s;
}
.primary-btn:hover { opacity: .85; }
.ghost-btn {
  width: 100%; margin-top: 8px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px;
  font-family: var(--f); font-size: 13px; font-weight: 500;
  color: var(--ink2); cursor: pointer; transition: all .15s;
}
.ghost-btn:hover { border-color: var(--ink3); color: var(--ink); }

/* ── LOADING ── */
.loader { padding: 60px 20px; text-align: center; }
.spinner {
  width: 24px; height: 24px; margin: 0 auto 14px;
  border: 2px solid var(--border); border-top-color: var(--ink);
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-size: 13px; color: var(--ink2); }

/* ── EMPTY ── */
.empty { padding: 48px 20px; text-align: center; }
.empty-icon { font-size: 28px; margin-bottom: 8px; }
.empty p { font-size: 13px; color: var(--ink2); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp .25s ease both; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<nav class="bottom-nav" id="nav">
  <div class="nav-item active" data-view="resumen" onclick="setView('resumen')">
    <div class="nav-ico">⊡</div>
    <div class="nav-lbl">Resumen</div>
  </div>
  <div class="nav-item" data-view="movimientos" onclick="setView('movimientos')">
    <div class="nav-ico">↕</div>
    <div class="nav-lbl">Movimientos</div>
  </div>
  <div class="nav-item" data-view="config" onclick="setView('config')">
    <div class="nav-ico">○</div>
    <div class="nav-lbl">Ajustes</div>
  </div>
</nav>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
// ─── HARDCODED CREDENTIALS ───────────────────────────────────
// Replace these two values with your own before sharing the file.
const SHEET_ID = '1qCjvEn76hqDEoalerFh-BU46dhnHjTi2vNQOFwAWXs8';
const API_KEY  = 'AIzaSyA2JNjOzjo_8EHiyyjEtiV0Vv89gcFdNes';
// ─────────────────────────────────────────────────────────────

const S = {
  view: 'resumen',
  sheetId: SHEET_ID,
  apiKey:  API_KEY,
  raw: null,
  selectedMonth: null,
  monthOpen: false,
  txFilter: 'todos',
  showAll: false,
};

// Column indices (0-based) matching the Apps Script output
const C = { DATE:0,TIME:1,OWNER:2,SOURCE:3,TYPE:4,DIR:5,AMOUNT:6,CUR:7,COUNTER:8,ACCOUNT:9,CAT:10,NOTES:11,ID:12 };

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
async function fetchSheet() {
  if (!S.sheetId || !S.apiKey) return null;
  const range = encodeURIComponent('Transactions!A2:M');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${range}?key=${S.apiKey}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).values || [];
  } catch(e) { console.error(e); return null; }
}

function parseRows(rows) {
  return (rows||[])
    .filter(r => r && r.length > 6)
    .map(r => ({
      date:   r[C.DATE]  ||'',
      time:   r[C.TIME]  ||'',
      owner:  r[C.OWNER] ||'',
      source: r[C.SOURCE]||'',
      type:   r[C.TYPE]  ||'',
      dir:    r[C.DIR]   ||'',
      amount: parseFloat(String(r[C.AMOUNT]||'0').replace(/,/g,'').replace(/\s/g,''))||0,
      currency: r[C.CUR]||'COP',
      counter:  r[C.COUNTER]||'',
      account:  r[C.ACCOUNT]||'',
      cat:    r[C.CAT]   ||'Sin categoría',
    }));
}

function months(txs) {
  return [...new Set(txs.map(t=>t.date.slice(0,7)))].sort().reverse();
}
function byMonth(txs, m) { return txs.filter(t=>t.date.startsWith(m)); }

// ─────────────────────────────────────────────
// FORMAT
// ─────────────────────────────────────────────
function fmtCOP(n) {
  const a = Math.abs(n||0);
  if (a >= 1_000_000) return '$' + (a/1_000_000).toFixed(1).replace('.',',') + 'M';
  return '$' + Math.round(a).toLocaleString('es-CO');
}
function fmtMonth(ym) {
  const [y,m] = ym.split('-');
  return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y;
}
function fmtDate(d) {
  if(!d) return '';
  const [,m,day] = d.split('-');
  return +day+' '+['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m];
}

// ─────────────────────────────────────────────
// CATEGORIES
// ─────────────────────────────────────────────
const EMOJI = {
  'Salud / EPS':'🏥','Cuota vehículo':'🚗','Deuda':'🏦','Tarjeta Nu':'💳',
  'Tarjeta Addi':'💳','Impuestos / Movilidad':'🏛️','Servicios públicos':'💡',
  'Empleada del hogar':'🏠','Transporte':'🚕','Domicilios / Rappi':'🛵',
  'Restaurantes / Comida':'🍽️','Mercado / Supermercado':'🛒','Lujo / Relojes':'⌚',
  'Ropa / Tecnología':'👕','Salud / Farmacia':'💊','Deporte / Gym':'🏃',
  'Bebé':'👶','Servicios':'📱','Suscripciones':'▶️','Internacional / Trabajo':'✈️',
  'Ahorro / Inversión':'💰','Ingreso':'💵','Ingreso internacional':'💵',
  'Movimiento interno':'↔️','Pago QR':'📲','Sin categoría':'·',
};
function emoji(cat) {
  for(const [k,v] of Object.entries(EMOJI)) if(cat&&cat.includes(k)) return v;
  return '·';
}

// Owner tag
function ownerTag(owner) {
  if(!owner) return '';
  const isJF = owner.toLowerCase().includes('juan');
  const cls  = isJF ? 'jf' : 'wife';
  const abbr = isJF ? 'JF' : owner.split(' ')[0].slice(0,2).toUpperCase();
  return `<span class="owner-tag ${cls}">${abbr}</span>`;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if (S.view === 'config') { app.innerHTML = renderConfig(); bindConfig(); return; }
  if (!S.sheetId || !S.apiKey) { app.innerHTML = renderSetup(); bindConfig(); return; }
  if (S.raw === null) { app.innerHTML = renderLoading(); load(); return; }

  const txs  = parseRows(S.raw);
  const mos  = months(txs);
  if (!S.selectedMonth && mos.length) S.selectedMonth = mos[0];
  const mo   = S.selectedMonth || '';

  if (S.view === 'resumen')     app.innerHTML = renderResumen(txs, mos, mo);
  if (S.view === 'movimientos') app.innerHTML = renderMovimientos(txs, mos, mo);

  // Bind month chips
  app.querySelectorAll('.m-chip').forEach(el => {
    el.onclick = () => { S.selectedMonth = el.dataset.m; S.showAll = false; S.monthOpen = false; render(); };
  });
  app.querySelector('.month-btn')?.addEventListener('click', () => {
    S.monthOpen = !S.monthOpen;
    app.querySelector('.month-picker')?.classList.toggle('open', S.monthOpen);
  });
}

// ── HEADER ──────────────────────────────────
function renderHeader(mo, mos) {
  return `
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="header-logo-mark">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="5" height="5" rx="1.2" fill="white"/>
            <rect x="8" y="1" width="5" height="5" rx="1.2" fill="white" opacity=".5"/>
            <rect x="1" y="8" width="5" height="5" rx="1.2" fill="white" opacity=".5"/>
            <rect x="8" y="8" width="5" height="5" rx="1.2" fill="white"/>
          </svg>
        </div>
        Finanzas Casa
      </div>
      <div class="header-right">
        ${mo ? `<button class="month-btn">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="10" height="9" rx="1.5"/>
            <path d="M4 1v2M8 1v2M1 5h10"/>
          </svg>
          ${fmtMonth(mo)}
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
        </button>` : ''}
      </div>
    </div>
  </div>
  <div class="month-picker${S.monthOpen?' open':''}">
    ${mos.map(m=>`<div class="m-chip${m===mo?' active':''}" data-m="${m}">${fmtMonth(m)}</div>`).join('')}
  </div>`;
}

// ── RESUMEN ──────────────────────────────────
function renderResumen(txs, mos, mo) {
  const monthly  = byMonth(txs, mo);
  const expenses = monthly.filter(t => t.dir === 'out');
  const income   = monthly.filter(t => t.dir === 'in');
  const totalExp = expenses.reduce((s,t) => s + Math.abs(t.amount), 0);
  const totalInc = income.reduce((s,t)   => s + Math.abs(t.amount), 0);
  const balance  = totalInc - totalExp;
  const maxBar   = Math.max(totalExp, totalInc) || 1;

  // Categories
  const catMap = {};
  expenses.forEach(t => { catMap[t.cat] = (catMap[t.cat]||0) + Math.abs(t.amount); });
  const cats   = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxCat = cats[0]?.[1]||1;

  // Income sources
  const incMap = {};
  income.forEach(t => { incMap[t.counter||'Ingreso'] = (incMap[t.counter||'Ingreso']||0) + Math.abs(t.amount); });
  const incRows = Object.entries(incMap).sort((a,b)=>b[1]-a[1]);

  // Recent expenses (5)
  const recent = [...expenses].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,5);

  return `
  ${renderHeader(mo, mos)}
  <div style="height:16px"></div>

  <div class="hero fade-up">
    <div class="hero-eyebrow">Gastos · ${fmtMonth(mo)}</div>
    <div class="hero-amount"><sup>$</sup>${Math.round(totalExp).toLocaleString('es-CO')}</div>
    <div class="hero-sub">
      <span class="hero-badge ${balance>=0?'green':'red'}">${balance>=0?'↑':'↓'} ${fmtCOP(Math.abs(balance))}</span>
      <span class="hero-sub-item" style="color:var(--ink3);font-size:12px">vs ingresos ${fmtCOP(totalInc)}</span>
    </div>
    <div class="hero-bars">
      <div class="hero-bar-row">
        <div class="hero-bar-label" style="color:var(--ink2)">Gastos</div>
        <div class="hero-bar-track"><div class="hero-bar-fill exp" style="width:${(totalExp/maxBar*100).toFixed(0)}%"></div></div>
        <div class="hero-bar-val">${fmtCOP(totalExp)}</div>
      </div>
      <div class="hero-bar-row">
        <div class="hero-bar-label" style="color:var(--green)">Ingresos</div>
        <div class="hero-bar-track"><div class="hero-bar-fill inc" style="width:${(totalInc/maxBar*100).toFixed(0)}%"></div></div>
        <div class="hero-bar-val" style="color:var(--green)">${fmtCOP(totalInc)}</div>
      </div>
    </div>
  </div>

  ${incRows.length ? `
  <div class="section-hd"><div class="section-title">Ingresos</div></div>
  <div class="card-shell fade-up">
    ${incRows.map(([name,amt])=>`
    <div class="income-row">
      <div class="income-icon">↑</div>
      <div class="income-body">
        <div class="income-name">${name}</div>
        <div class="income-sub">Transferencia recibida</div>
      </div>
      <div class="income-amt">+${fmtCOP(amt)}</div>
    </div>`).join('')}
  </div>` : ''}

  <div class="section-hd">
    <div class="section-title">Por categoría</div>
  </div>
  <div class="card-shell fade-up">
    ${cats.length ? cats.map(([cat,amt])=>`
    <div class="cat-row">
      <div class="cat-icon">${emoji(cat)}</div>
      <div class="cat-body">
        <div class="cat-name">${cat}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(amt/maxCat*100).toFixed(0)}%"></div></div>
      </div>
      <div class="cat-right">
        <div class="cat-amt">${fmtCOP(amt)}</div>
        <div class="cat-pct">${(amt/totalExp*100).toFixed(0)}%</div>
      </div>
    </div>`).join('') : '<div class="empty"><div class="empty-icon">·</div><p>Sin gastos este mes</p></div>'}
  </div>

  <div class="section-hd">
    <div class="section-title">Recientes</div>
    <div class="section-action" onclick="setView('movimientos')">Ver todos →</div>
  </div>
  <div class="card-shell fade-up">
    ${renderTxRows(recent, true)}
  </div>
  <div style="height:8px"></div>`;
}

// ── MOVIMIENTOS ──────────────────────────────
function renderMovimientos(txs, mos, mo) {
  const monthly = byMonth(txs, mo).filter(t => t.dir !== 'internal');
  let filtered  = monthly;
  if (S.txFilter === 'out') filtered = monthly.filter(t=>t.dir==='out');
  if (S.txFilter === 'in')  filtered = monthly.filter(t=>t.dir==='in');
  filtered = [...filtered].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  const shown = S.showAll ? filtered : filtered.slice(0, 25);

  return `
  ${renderHeader(mo, mos)}
  <div class="filter-tabs">
    ${[['todos','Todos'],['out','Gastos'],['in','Ingresos']].map(([k,l])=>
      `<button class="f-tab${S.txFilter===k?' active':''}" onclick="setFilter('${k}')">${l}</button>`
    ).join('')}
  </div>
  <div style="height:12px"></div>
  <div class="card-shell fade-up">
    ${renderTxRows(shown, true)}
    ${filtered.length > shown.length
      ? `<button class="show-more-btn" onclick="showMore()">Ver ${filtered.length-shown.length} más</button>`
      : ''}
  </div>
  <div style="height:8px"></div>`;
}

// ── TX ROWS ──────────────────────────────────
function renderTxRows(txs, showDate) {
  if (!txs.length) return '<div class="empty"><div class="empty-icon">·</div><p>Sin movimientos</p></div>';
  return txs.map(t => {
    const cls    = t.dir==='in' ? 'in' : t.dir==='internal' ? 'int' : 'out';
    const prefix = t.dir==='in' ? '+' : '';
    return `
    <div class="tx-row">
      <div class="tx-icon">${emoji(t.cat)}</div>
      <div class="tx-body">
        <div class="tx-name">${t.counter||t.type}</div>
        <div class="tx-meta">
          ${showDate ? `<span class="tx-date">${fmtDate(t.date)}</span><span class="tx-dot"></span>` : ''}
          <span class="tx-cat">${t.cat}</span>
          <span class="tx-dot"></span>
          ${ownerTag(t.owner)}
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amt ${cls}">${prefix}${fmtCOP(t.amount)}</div>
        <div class="tx-src">${t.source}</div>
      </div>
    </div>`;
  }).join('');
}

}

      <div style="margin-top:20px;padding:14px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)">

        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></span>
            Bancolombia notificaciones
          </div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></span>
            Uber recibos
          </div>
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></span>
            Rappi recibos
          </div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--ink3)">
        ¿Algún problema? Escríbele a Juan Felipe.
      </div>
    </div>
  </div>`;
}
function configFields() {
  return `
  <div class="field">
    <div class="field-label">Sheet ID</div>
    <input class="field-input" id="inp-sid" placeholder="1BxiMVs0XRA5nFMdKvBdBZj..." value="${S.sheetId}">
    <div class="field-hint">En la URL: docs.google.com/spreadsheets/d/<code>ID</code>/edit</div>
  </div>
  <div class="field">
    <div class="field-label">Google API Key</div>
    <input class="field-input" id="inp-key" placeholder="AIzaSy..." value="${S.apiKey}">
    <div class="field-hint">Créala en <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--ink2)">Google Cloud Console</a> con permiso a Sheets API. Comparte la hoja como "cualquiera con el enlace puede ver".</div>
  </div>`;
}
function bindConfig() {
  document.getElementById('save-btn')?.addEventListener('click', () => {
    S.sheetId = document.getElementById('inp-sid')?.value.trim()||'';
    S.apiKey  = document.getElementById('inp-key')?.value.trim()||'';
    S.raw = null; S.view = 'resumen'; render();
  });
  document.getElementById('clear-btn')?.addEventListener('click', () => {
    S.raw=null; render();
  });
}

function renderLoading() {
  return `${renderHeader(null,[])}<div class="loader"><div class="spinner"></div><p>Cargando…</p></div>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function setView(v) {
  S.view=v; S.showAll=false; S.monthOpen=false;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-view="${v}"]`)?.classList.add('active');
  render();
}
function setFilter(f) { S.txFilter=f; S.showAll=false; render(); }
function showMore() { S.showAll=true; render(); }

async function load() {
  const rows = await fetchSheet();
  S.raw = rows||[];
  const txs = parseRows(S.raw);
  const mos = months(txs);
  if (mos.length) S.selectedMonth = mos[0];
  render();
}
